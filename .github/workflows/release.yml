name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Build rbxm
        run: rojo build default.project.json -o lync.rbxm

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: lync.rbxm
          generate_release_notes: true